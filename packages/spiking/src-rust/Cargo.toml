[package]
name = "spiking-native"
version = "1.0.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2.16.4", default-features = false, features = ["napi4", "napi8", "serde-json"] }
napi-derive = "2.16.2"
rayon = "1.10.0"
serde = { version = "1.0.198", features = ["derive"] }
serde_json = "1.0.116"

[build-dependencies]
napi-build = "2.1.2"
